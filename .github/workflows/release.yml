name: Release

# Triggers on any tag starting with 'v' (e.g. v1.0.0)
# or manually from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
            # Disable ggml native ARM feature probing — GitHub's Apple Silicon
            # runners don't support i8mm at runtime, causing a compile error when
            # ggml enables MATMUL_INT8 via its compile-time probe but then emits
            # noi8mm cpu flags. GGML_NATIVE=OFF suppresses this detection entirely.
            cmakeToolchainFile: cmake/apple-silicon.cmake

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Bun (JS runtime / package manager) ────────────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Remove the legacy indicator lib if present — it conflicts with ayatana
          sudo apt-get remove -y libappindicator3-dev || true
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            curl

      # ── Frontend dependencies ──────────────────────────────────────────────
      - name: Install frontend dependencies
        run: bun install

      # ── Make scripts executable ───────────────────────────────────────────
      - name: Make scripts executable
        if: runner.os != 'Windows'
        run: chmod +x scripts/tauri-safe.sh

      # ── macOS: configure cmake toolchain for Apple Silicon ─────────────────
      - name: Set cmake toolchain (macOS ARM)
        if: matrix.os == 'macos-latest' && matrix.cmakeToolchainFile != ''
        run: |
          echo "CMAKE_TOOLCHAIN_FILE_aarch64_apple_darwin=${{ github.workspace }}/src-tauri/${{ matrix.cmakeToolchainFile }}" >> "$GITHUB_ENV"

      # ── Windows: install LLVM for bindgen (whisper-rs-sys) ─────────────────
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # ── Skip pre-generated bindings on Linux/macOS (they work there) ───────
      # On Windows we must let bindgen generate proper Windows bindings,
      # because the bundled pre-generated bindings contain Linux-only types.
      - name: Set whisper bindings env (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> "$GITHUB_ENV"

      # ── Build & package with Tauri ─────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          NODE_ENV: production
          # macOS code signing (optional — remove if not signing)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Knowte ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details.
          tauriScript: 'bun tauri'
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
