name: Release

# Triggers on any tag starting with 'v' (e.g. v1.0.0)
# or manually from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Bun (JS runtime / package manager) ────────────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Frontend dependencies ──────────────────────────────────────────────
      - name: Install frontend dependencies
        run: bun install

      # ── Make scripts executable ───────────────────────────────────────────
      - name: Make scripts executable
        run: chmod +x scripts/tauri-safe.sh

      # ── Build & package with Tauri ─────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional — remove if not signing)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Knowte ${{ github.ref_name }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details.
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
          # Produce all formats for each platform
          args: --bundles all
